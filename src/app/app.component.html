<div class="floating-island">
  <div class="avatar">
    @if (profileImageSrc) {
      <img
        [src]="profileImageSrc"
        [alt]="basicDetails.fullName"
        referrerpolicy="no-referrer"
        (error)="onProfileImageError()"
      />
    } @else {
      <span>{{ basicDetails.shortForm || 'ME' }}</span>
    }
  </div>

  <div class="identity">
    <span class="name">{{ basicDetails.fullName }}</span>
    <span class="dash">, </span>
    <span class="role">{{ basicDetails.role || 'Developer' }}</span>
  </div>
</div>

<div class="menu-island">
  <div class="menu-actions">
    <button
      type="button"
      class="theme-trigger"
      [class.is-dark]="currentTheme === 'dark'"
      [attr.aria-label]="currentTheme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'"
      (click)="toggleTheme()"
    >
      <span class="material-symbols-rounded bubble-icon" aria-hidden="true">
        {{ currentTheme === 'dark' ? 'dark_mode' : 'light_mode' }}
      </span>
    </button>

    <button
      type="button"
      class="menu-trigger"
      [class.open]="isMenuOpen"
      [attr.aria-label]="isMenuOpen ? 'Close menu' : 'Open menu'"
      (click)="toggleMenu()"
    >
      <span class="material-symbols-rounded bubble-icon" aria-hidden="true">
        {{ isMenuOpen ? 'close' : 'menu' }}
      </span>
    </button>
  </div>

  @if (isMenuOpen) {
    <div class="menu-panel">
      @if (sectionMenuItems.length > 0) {
        <div class="section-list">
          @for (item of sectionMenuItems; track item; let i = $index) {
            <button type="button" class="section-item" [style.--item-index]="i">{{ item }}</button>
          }
        </div>
      } @else {
        <div class="empty-sections">Loading sections...</div>
      }
    </div>
  }
</div>
